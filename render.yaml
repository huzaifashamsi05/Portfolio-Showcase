services:
  - type: web
    name: portfolio-api
    env: node
    buildCommand: pnpm install && pnpm run build
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
